  hostname: "netdata-k8s-state"
  enabled: true
  port: "{{ .Values.parent.port }}"

  resources: {}
    # limits:
    #  cpu: 4
    #  memory: 4096Mi
    # requests:
    #  cpu: 4
    #  memory: 4096Mi

  livenessProbe:
    initialDelaySeconds: 0
    failureThreshold: 3
    periodSeconds: 30
