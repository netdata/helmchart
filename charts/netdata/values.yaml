# OpenTelemetry Collector subchart configuration
# This is an optional component that allows to gather logs from k8s cluster.
# If you already have an exporter of any kind, just point it to the netdata-otel service
# Documentation: https://opentelemetry.io/docs/platforms/kubernetes/helm/collector/
otel-collector:
  # Set to true to enable the OpenTelemetry Collector
  enabled: false

  # Deployment mode: daemonset, deployment, or statefulset
  mode: daemonset

  # Image configuration
  image:
    repository: otel/opentelemetry-collector-k8s

  # Presets enable quick configuration for common use cases
  presets:
    # Collect Kubernetes attributes and add them to logs
    kubernetesAttributes:
      enabled: true
    # Collect logs from Kubernetes pods
    logsCollection:
      enabled: true
      includeCollectorLogs: false

  # OpenTelemetry Collector configuration
  config:
    receivers:
      # Filelog receiver - collects logs from container log files
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # Exclude OTel collector's own logs to avoid loop
          - /var/log/pods/*/otc-container/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Parse CRI-O/containerd format logs
          - type: container
            id: container-parser
            max_log_size: 102400

    processors:
      # Batch processor - recommended for better performance
      batch:
        send_batch_size: 1000
        timeout: 10s
        send_batch_max_size: 1500

      # Memory limiter to prevent OOM
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25

      # Resource detection processor
      resourcedetection:
        detectors: [env, system]
        timeout: 5s

      # Kubernetes attributes processor - adds K8s metadata to logs
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.container.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: component
              key: component
              from: pod
          annotations:
            - tag_name: annotation.app
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

    exporters:
      # OTLP gRPC exporter to your endpoint
      otlp:
        endpoint: "{{ .Release.Name }}-otel:4317"
        tls:
          insecure: true
        # Uncomment and configure if you need authentication
        # headers:
        #   authorization: "Bearer YOUR_TOKEN"
        #   api-key: "your-api-key"

        # Retry configuration
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

        # Queue to handle temporary failures
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 1000

      # Debug exporter for troubleshooting (optional)
      # Uncomment to see logs being exported
      # debug:
      #   verbosity: detailed
      #   sampling_initial: 5
      #   sampling_thereafter: 200

    service:
      pipelines:
        # Logs pipeline
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [otlp]

  # Resources
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Service account with necessary RBAC permissions
  serviceAccount:
    create: true

  # RBAC for accessing Kubernetes API
  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["pods", "namespaces", "nodes"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]

  # Tolerations to run on all nodes
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

  # Ports configuration
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
